<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />

        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="612x612"
            href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ8KJo9wT5brzawi-GrSYanoKykVeBWT0iHKA&s"
        />
        <title>Hello Neighbor Piano — Bread</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                margin: 0;
                height: 100dvh; /* лучше для мобильных (учитывает адресную строку) */
                min-height: -webkit-fill-available;
                background: linear-gradient(135deg, #1e1e2f, #2a1a3d);
                color: #e0d0ff;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                text-align: center;
                overflow: hidden;
                transition: background 1s ease;
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                touch-action: manipulation; /* улучшает тач на телефонах */
            }

            h1 {
                font-size: clamp(1.8rem, 6vw, 2.6rem); /* адаптивный размер */
                margin: 0.6em 0 1em;
                text-shadow: 0 0 15px rgba(180, 140, 255, 0.6);
                padding: 0 1rem;
            }

            .player {
                background: rgba(40, 30, 60, 0.65);
                backdrop-filter: blur(10px);
                padding: clamp(1.5rem, 5vw, 2.5rem) clamp(1.5rem, 5vw, 3rem);
                border-radius: 20px;
                box-shadow:
                    0 15px 40px rgba(0, 0, 0, 0.7),
                    inset 0 0 20px rgba(120, 80, 220, 0.15);
                max-width: 90vw;
                width: 420px;
                max-width: 420px;
                transition: opacity 0.6s ease;
            }

            audio {
                width: 100%;
                margin: 1.5rem 0 1.2rem;
                filter: brightness(1.1);
                height: 50px; /* чуть больше для тача */
            }

            audio::-webkit-media-controls-panel {
                background: rgba(30, 20, 50, 0.9);
                border-radius: 12px;
            }

            .gif-container {
                position: fixed;
                inset: 0;
                pointer-events: none;
                z-index: -1;
                opacity: 0;
                transition: opacity 0.8s ease;
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
            }

            .playing .gif-container {
                opacity: 1;
            }

            .gif-container img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                animation-duration: 6s !important;
                animation-iteration-count: infinite;
                animation-timing-function: linear;
            }

            .download-btn {
                display: inline-block;
                margin-top: 1.2rem;
                padding: 0.9rem 2rem;
                background: rgba(120, 80, 220, 0.8);
                color: white;
                border: none;
                border-radius: 12px;
                font-size: clamp(1rem, 4vw, 1.1rem);
                cursor: pointer;
                text-decoration: none;
                transition:
                    background 0.3s,
                    transform 0.15s;
                touch-action: manipulation;
            }

            .download-btn:active {
                transform: scale(0.96); /* приятный тач-эффект */
            }

            .download-btn:hover {
                background: rgba(140, 100, 240, 1);
            }

            .credits,
            .small-note {
                margin-top: 1.8rem;
                font-size: clamp(0.85rem, 3.5vw, 0.95rem);
                opacity: 0.7;
                padding: 0 1rem;
            }

            .small-note {
                opacity: 0.6;
                margin-top: 1rem;
            }

            @media (orientation: landscape) and (max-height: 500px) {
                h1 {
                    font-size: 1.8rem;
                    margin: 0.4em 0;
                }
                .player {
                    padding: 1.2rem 2rem;
                }
            }
        </style>
    </head>
    <body id="body">
        <div class="gif-container" id="gifLayer"></div>

        <h1>Hello Neighbor — Piano Melody</h1>

        <div class="player" id="player">
            <p
                style="
                    margin: 0.5em 0 1.2em;
                    font-size: clamp(1rem, 4vw, 1.1rem);
                "
            >
                Bread plays the melody from Hello Neighbor on the piano
            </p>

            <audio controls id="audioPlayer">
                <source
                    src="Bread plays the melody from the game Hello Neighbor on the piano..mp3"
                    type="audio/mpeg"
                />
                Ваш браузер не поддерживает аудио.
            </audio>

            <a
                href="Bread plays the melody from the game Hello Neighbor on the piano..mp3"
                download="Hello Neighbor Piano - Bread.mp3"
                class="download-btn"
            >
                Скачать аудио
            </a>
        </div>

        <script>
            const audio = document.getElementById("audioPlayer");
            const body = document.getElementById("body");
            const player = document.getElementById("player");
            const gifLayer = document.getElementById("gifLayer");

            const playingGif =
                "d9bfc9_26194df85b994b38b0a1a9c1269faaff~mv2.gif";
            const pausedBg =
                'url("d9bfc9_16186ffecf0c4d6db25740e4ca1cf92a~mv2.gif")';

            function updateState() {
                if (!audio.paused && !audio.ended) {
                    document.body.classList.add("playing");
                    player.style.opacity = "1";
                    gifLayer.innerHTML = `<img src="${playingGif}" alt="animation">`;
                    body.style.backgroundImage = "none";
                } else {
                    document.body.classList.remove("playing");
                    player.style.opacity = "0.85";
                    gifLayer.innerHTML = "";
                    body.style.backgroundImage = pausedBg;
                }
            }

            audio.addEventListener("play", updateState);
            audio.addEventListener("pause", updateState);
            audio.addEventListener("ended", updateState);
            audio.addEventListener("canplay", updateState); // на всякий случай для мобильных

            // начальное состояние
            updateState();

            // для iOS/Android — иногда помогает разблокировать звук после тача
            document.addEventListener(
                "touchstart",
                function () {
                    audio.load(); // preload
                },
                { once: true },
            );
        </script>
    </body>
</html>
